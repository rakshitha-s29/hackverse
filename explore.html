<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveza | Explore Regions</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .region-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .region-btn {
            background: rgba(10,15,10,0.6);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .region-btn:hover, .region-btn.active {
            background: var(--primary-color);
            color: var(--bg-color);
            box-shadow: 0 0 25px rgba(245, 215, 110, 0.3);
            border: 1px solid var(--primary-color);
            transform: translateY(-3px);
        }

        .explore-hero {
            padding-top: 120px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .sub-header {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .destination-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 50px 50px 50px;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .destination-grid.show {
            opacity: 1;
        }

        .region-empty-state {
            text-align: center;
            color: var(--text-muted);
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- Inline SVG definitions for gradients -->
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
      <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
          <stop offset="50%" style="stop-color:#8e2de2;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
        </linearGradient>
      </defs>
    </svg>

    <nav class="navbar scrolled" id="navbar">
        <div class="nav-brand" style="display:flex; align-items:center; padding-left: 10px;"><img src="/logo.png" alt="Traveza Logo" style="height: 110px; width: auto; object-fit: contain; cursor:pointer;" onclick="window.location=\'/\'"></div>
        <div class="nav-links" style="display:flex; align-items:center;">
            <a href="/">Home</a>
            <a href="/#destinations">Destinations</a>
            <a href="https://www.makemytrip.com/flights/" target="_blank">Transport</a>
            <a href="/itinerary" style="color:var(--primary-color);">My Itinerary</a>
        </div>
    </nav>

    <main>
        <div class="explore-hero">
            <h1 class="sub-header">Choose Your Travel Region</h1>
            <p style="color: var(--text-muted); font-size: 18px;">Filter our curated destinations by the vibrant geographies of India.</p>
        </div>

        <div class="region-controls" id="region-controls">
            <button class="region-btn" data-region="north">North India</button>
            <button class="region-btn" data-region="south">South India</button>
            <button class="region-btn" data-region="northeast">Northeast India</button>
        </div>

        <div id="region-destinations-grid" class="destination-grid">
            <div class="region-empty-state">Select a region above to explore beautiful destinations.</div>
        </div>
    </main>

    <script src="/explore.js"></script>
</body>
</html>
